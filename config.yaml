# Commodities — oil is a critical macro signal for the personal defense dashboard
commodities:
  - BZ=F      # Brent Crude Futures (international benchmark)
  - CL=F      # WTI Crude Futures (US benchmark)

# Supply chain proxy tickers — fetched via yfinance for cascade engine
supply_chain_proxies:
  - NG=F      # Natural Gas futures
  - ZW=F      # Wheat futures
  - ZC=F      # Corn futures
  - HG=F      # Copper futures
  - SOXX      # PHLX Semiconductor ETF
  - DBA       # Invesco DB Agriculture Fund
  # v2 additions — fertilizer, pharma, India, materials
  - MOS       # Mosaic — phosphate/potash fertilizer
  - NTR       # Nutrien — nitrogen/potash/phosphate
  - CF        # CF Industries — nitrogen fertilizer
  - XPH       # SPDR S&P Pharmaceuticals ETF
  - INDA      # iShares MSCI India ETF
  - SLX       # VanEck Steel ETF — materials/industrial proxy

# Supply chain cascade timeline anchoring
supply_chain:
  # Set to a date (YYYY-MM-DD) to manually anchor cascade timelines.
  # When null, the engine uses Hormuz API crisis data or historical peak date.
  crisis_start_override: "2026-02-28"  # Iran conflict / Strait of Hormuz disruption onset

# Market indices to track for overall health
market_indices:
  - ^GSPC     # S&P 500
  - ^DJI      # Dow Jones
  - ^IXIC     # Nasdaq Composite
  - ^RUT      # Russell 2000
  - ^VIX      # Volatility Index (Fear Index)
  - ^TNX      # 10-Year Treasury Yield

analysis:
  # How many days of historical data to fetch for trend analysis
  lookback_days: 90
  # Moving average periods
  short_ma: 50
  long_ma: 200

risk_thresholds:
  vix_elevated: 20
  vix_high: 30
  vix_crisis: 40
  # Max single-day drop to flag (percentage)
  daily_drop_alert: -3.0
  # Max weekly drop to flag (percentage)
  weekly_drop_alert: -5.0
  # RSI overbought/oversold
  rsi_overbought: 70
  rsi_oversold: 30

schedule:
  # Quick market scan interval during market hours (minutes)
  quick_scan_minutes: 30
  # Full analysis (daily)
  full_analysis_time: "18:00"
  # Weekly briefing (day and time)
  weekly_briefing_day: "sunday"
  weekly_briefing_time: "19:00"

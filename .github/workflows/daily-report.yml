name: Daily Market Report

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config.yaml'
      - 'requirements.txt'
      - '.github/workflows/daily-report.yml'
  schedule:
    # 12:00 UTC = 7:00 AM ET (pre-market, weekdays)
    - cron: '0 12 * * 1-5'
    # 21:30 UTC = 4:30 PM ET (post-market close, weekdays)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    env:
      TZ: America/New_York

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src report --output docs/index.html --no-open

      - name: Verify FRED/macro is present in HTML
        run: |
          test -f docs/index.html
          grep -qE 'Macroeconomic Indicators \(FRED\)|Macro \(FRED\)' docs/index.html \
            || { echo "::error::Report HTML missing FRED/macro markers — check FRED_API_KEY secret and network."; exit 1; }

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
          commit_message: "Update report — ${{ github.event_name }}"

name: Daily Market Report

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config.yaml'
      - 'requirements.txt'
      - '.github/workflows/daily-report.yml'
  schedule:
    # 12:00 UTC = 7:00 AM ET (pre-market, weekdays)
    - cron: '0 12 * * 1-5'
    # 21:30 UTC = 4:30 PM ET (post-market close, weekdays)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    env:
      TZ: America/New_York

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m src report --output docs/index.html --no-open

      - name: Verify FRED/macro is present in HTML
        run: |
          test -f docs/index.html
          grep -qE 'Macroeconomic Indicators \(FRED\)|Macro \(FRED\)' docs/index.html \
            || { echo "::error::Report HTML missing FRED/macro markers — check FRED_API_KEY secret and network."; exit 1; }

      - name: Persist data history files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changed=false
          for f in data/risk_score_history.jsonl data/risk_score_daily.json data/supply_chain_history.jsonl; do
            if [ -f "$f" ]; then
              git add "$f"
              changed=true
            fi
          done
          if [ "$changed" = true ]; then
            git diff --cached --quiet || git commit -m "data: snapshot (${{ github.event_name }})"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
          commit_message: "Update report — ${{ github.event_name }}"

      - name: Close open report alerts on success
        if: success()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'report-alert',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Report succeeded — auto-closing.\n\n[Run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'report-alert',
              state: 'open',
            });
            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open[0].number,
                body: `Another failure — ${context.eventName} trigger.\n\n[Run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Market Report failed — ${new Date().toISOString().split('T')[0]}`,
              body: [
                `The Daily Market Report workflow failed.`,
                ``,
                `| Detail | Value |`,
                `|--------|-------|`,
                `| **Run** | [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
                `| **Trigger** | ${context.eventName} |`,
                `| **Time (UTC)** | ${new Date().toISOString()} |`,
                ``,
                `Check the run logs for the failing step.`,
              ].join('\n'),
              labels: ['report-alert'],
            });
